<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Join as a Driver - INFINITRIP</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="styles-additional.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .join-section {
            min-height: 90vh;
            padding: 3rem 0 4rem;
            background: linear-gradient(135deg, var(--light) 0%, white 100%);
        }
        .join-container {
            max-width: 520px;
            margin: 0 auto;
            background: white;
            padding: 2.5rem;
            border-radius: 24px;
            box-shadow: var(--shadow-lg);
            border: 1px solid var(--border);
        }
        .join-header {
            text-align: center;
            margin-bottom: 2rem;
        }
        .join-header h1 {
            font-size: 1.75rem;
            color: var(--dark);
            margin-bottom: 0.5rem;
        }
        .join-header p {
            color: var(--text);
            font-size: 0.95rem;
        }
        .join-icon {
            width: 72px;
            height: 72px;
            background: linear-gradient(135deg, #0891b2 0%, #06b6d4 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1.25rem;
            color: white;
            font-size: 1.75rem;
        }
        .join-form .form-group {
            margin-bottom: 1.25rem;
        }
        .join-form label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 600;
            color: var(--text-dark);
            font-size: 0.9rem;
        }
        .join-form input,
        .join-form select {
            width: 100%;
            padding: 0.85rem 1rem;
            border: 2px solid var(--border);
            border-radius: 12px;
            font-family: inherit;
            font-size: 1rem;
        }
        .join-form input:focus,
        .join-form select:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(249, 115, 22, 0.12);
        }
        .form-row-2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
        }
        @media (max-width: 520px) {
            .form-row-2 { grid-template-columns: 1fr; }
        }
        .msg {
            padding: 0.75rem 1rem;
            border-radius: 10px;
            margin-bottom: 1rem;
            font-size: 0.9rem;
            display: none;
        }
        .msg.show { display: block; }
        .msg.error {
            background: rgba(239, 68, 68, 0.1);
            color: var(--danger);
        }
        .msg.success {
            background: rgba(34, 197, 94, 0.12);
            color: #15803d;
        }
        .join-footer {
            text-align: center;
            margin-top: 1.5rem;
            padding-top: 1.5rem;
            border-top: 1px solid var(--border);
            font-size: 0.95rem;
            color: var(--text);
        }
        .join-footer a {
            color: var(--primary);
            font-weight: 600;
            text-decoration: none;
        }
        .join-footer a:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="container">
            <div class="nav-wrapper">
                <div class="logo">
                    <a href="index.html" style="text-decoration:none;color:inherit;display:flex;align-items:center;gap:8px;">
                        <img src="images/logo.png" alt="INFINITRIP" onerror="this.style.display='none'; this.nextElementSibling.style.display='inline-flex';">
                        <span style="display: none;"><i class="fas fa-globe"></i> INFINITRIP</span>
                    </a>
                </div>
                <ul class="nav-menu">
                    <li><a href="index.html">Home</a></li>
                    <li><a href="signin.html">Sign In</a></li>
                </ul>
                <div class="hamburger"><span></span><span></span><span></span></div>
            </div>
        </div>
    </nav>

    <section class="join-section">
        <div class="container">
            <div class="join-container">
                <div class="join-header">
                    <div class="join-icon"><i class="fas fa-id-card"></i></div>
                    <h1>Join INFINITRIP as a Driver</h1>
                    <p>Submit your details. Our team will review your application in the admin panel. Once approved, you can sign in and use the driver dashboard.</p>
                </div>
                <div class="msg error" id="formError"></div>
                <div class="msg success" id="formSuccess"></div>
                <form id="driverJoinForm" class="join-form" novalidate>
                    <div class="form-group">
                        <label for="djName">Full name *</label>
                        <input type="text" id="djName" name="name" required autocomplete="name" placeholder="As on driving licence">
                    </div>
                    <div class="form-group">
                        <label for="djEmail">Email *</label>
                        <input type="email" id="djEmail" name="email" required autocomplete="email" placeholder="you@example.com">
                    </div>
                    <div class="form-group">
                        <label for="djPhone">Phone *</label>
                        <input type="tel" id="djPhone" name="phone" required autocomplete="tel" placeholder="10-digit mobile">
                    </div>
                    <div class="form-row-2">
                        <div class="form-group">
                            <label for="djPassword">Password *</label>
                            <input type="password" id="djPassword" name="password" required minlength="6" autocomplete="new-password" placeholder="Min. 6 characters">
                        </div>
                        <div class="form-group">
                            <label for="djConfirm">Confirm password *</label>
                            <input type="password" id="djConfirm" name="confirm" required autocomplete="new-password">
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="djLicense">Driving licence number *</label>
                        <input type="text" id="djLicense" name="license" required placeholder="Licence number">
                    </div>
                    <div class="form-group">
                        <label for="djVehicleCat">Vehicle category *</label>
                        <select id="djVehicleCat" name="vehicleCategory" required>
                            <option value="">Select</option>
                            <option value="3-5">Sedan / 3–5 seats</option>
                            <option value="7-8">SUV / 7–8 seats</option>
                            <option value="12+">Tempo / 12+ seats</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="djVehicleNo">Vehicle registration (optional)</label>
                        <input type="text" id="djVehicleNo" name="vehicleNumber" placeholder="e.g. GJ-01-AB-1234">
                    </div>
                    <button type="submit" class="btn btn-primary btn-large" style="width:100%;">
                        <i class="fas fa-paper-plane"></i> Submit application
                    </button>
                </form>
                <div class="join-footer">
                    Already registered? <a href="signin.html">Sign in</a> · <a href="index.html">Back to home</a>
                </div>
            </div>
        </div>
    </section>

    <script src="script.js"></script>
    <script>
        (function () {
            const form = document.getElementById('driverJoinForm');
            const err = document.getElementById('formError');
            const ok = document.getElementById('formSuccess');

            function showError(msg) {
                ok.classList.remove('show');
                err.textContent = msg;
                err.classList.add('show');
            }
            function showSuccess(msg) {
                err.classList.remove('show');
                ok.textContent = msg;
                ok.classList.add('show');
            }

            form.addEventListener('submit', function (e) {
                e.preventDefault();
                err.classList.remove('show');
                ok.classList.remove('show');

                const name = document.getElementById('djName').value.trim();
                const email = document.getElementById('djEmail').value.trim().toLowerCase();
                const phone = document.getElementById('djPhone').value.trim();
                const password = document.getElementById('djPassword').value;
                const confirm = document.getElementById('djConfirm').value;
                const licenseNumber = document.getElementById('djLicense').value.trim();
                const vehicleCategory = document.getElementById('djVehicleCat').value;
                const vehicleNumber = document.getElementById('djVehicleNo').value.trim();

                if (!name || !email || !phone || !password || !licenseNumber || !vehicleCategory) {
                    showError('Please fill all required fields.');
                    return;
                }
                if (password !== confirm) {
                    showError('Passwords do not match.');
                    return;
                }
                if (password.length < 6) {
                    showError('Password must be at least 6 characters.');
                    return;
                }

                let drivers = [];
                try {
                    drivers = JSON.parse(localStorage.getItem('drivers') || '[]');
                } catch (x) {
                    drivers = [];
                }

                if (drivers.some(d => (d.email || '').toLowerCase() === email)) {
                    showError('An application or account with this email already exists.');
                    return;
                }

                const nextId = drivers.length
                    ? Math.max(...drivers.map(d => Number(d.id) || 0), 0) + 1
                    : 1;

                drivers.push({
                    id: nextId,
                    name,
                    email,
                    password,
                    phone,
                    licenseNumber,
                    vehicleCategory,
                    vehicleNumber: vehicleNumber || '',
                    status: 'pending',
                    registeredDate: new Date().toISOString()
                });

                localStorage.setItem('drivers', JSON.stringify(drivers));
                showSuccess('Application submitted. An admin will review it. You can sign in once your account is approved.');
                form.reset();
            });
        })();
    </script>
</body>
</html>
