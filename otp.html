<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OTP Verification - INFINITRIP</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .otp-container {
            min-height: calc(100vh - 140px);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 1rem;
            background: var(--light-gray);
        }

        .otp-card {
            background: var(--white);
            padding: 2.5rem;
            border-radius: 16px;
            box-shadow: var(--shadow-lg);
            border: 1px solid var(--border);
            width: 100%;
            max-width: 520px;
        }

        .otp-header {
            margin-bottom: 1.25rem;
        }

        .otp-header h1 {
            font-size: 1.9rem;
            color: var(--dark);
            margin-bottom: 0.4rem;
            font-weight: 800;
        }

        .otp-header p {
            color: var(--text);
            font-size: 1rem;
        }

        .message {
            padding: 12px 14px;
            border-radius: 10px;
            margin-bottom: 1rem;
            display: none;
        }

        .message.error {
            background: rgba(239, 68, 68, 0.12);
            color: var(--danger);
            border: 1px solid rgba(239, 68, 68, 0.25);
        }

        .message.success {
            background: rgba(34, 197, 94, 0.12);
            color: var(--success);
            border: 1px solid rgba(34, 197, 94, 0.25);
        }

        .message.show {
            display: block;
        }

        .otp-form {
            display: flex;
            flex-direction: column;
            gap: 0.9rem;
            margin-top: 0.5rem;
        }

        .otp-input {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid var(--border);
            border-radius: 12px;
            font-family: inherit;
            font-size: 1.05rem;
            letter-spacing: 0.1em;
            text-align: center;
        }

        .otp-input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(249, 115, 22, 0.12);
        }

        .otp-actions {
            display: flex;
            gap: 0.75rem;
            flex-wrap: wrap;
            margin-top: 0.25rem;
        }

        .btn-primary {
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 12px;
            padding: 0.9rem 1.2rem;
            font-weight: 700;
            cursor: pointer;
            flex: 1;
            min-width: 170px;
            transition: transform 0.15s ease, opacity 0.15s ease;
        }

        .btn-primary:hover { transform: translateY(-1px); }
        .btn-primary:disabled { opacity: 0.6; cursor: not-allowed; }

        .btn-secondary {
            background: var(--light-gray);
            color: var(--text-dark);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 0.9rem 1.2rem;
            font-weight: 700;
            cursor: pointer;
            flex: 1;
            min-width: 170px;
            transition: transform 0.15s ease, opacity 0.15s ease;
        }

        .btn-secondary:hover { transform: translateY(-1px); }
        .btn-secondary:disabled { opacity: 0.6; cursor: not-allowed; }

        .otp-meta {
            background: rgba(8, 145, 178, 0.06);
            border: 1px solid rgba(8, 145, 178, 0.15);
            padding: 12px 14px;
            border-radius: 12px;
            margin-top: 0.25rem;
            color: var(--text-dark);
            font-size: 0.95rem;
        }

        .otp-demo {
            margin-top: 0.75rem;
            background: rgba(249, 115, 22, 0.08);
            border: 1px dashed rgba(249, 115, 22, 0.35);
            padding: 12px 14px;
            border-radius: 12px;
            font-size: 0.95rem;
            color: var(--text-dark);
            display: none;
        }

        .otp-demo.show { display: block; }

        .back-link {
            margin-top: 1rem;
            text-align: center;
        }

        .back-link a {
            color: var(--primary);
            text-decoration: none;
            font-weight: 700;
        }

        .back-link a:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar">
        <div class="container">
            <div class="nav-wrapper">
                <div class="logo">
                    <img src="images/logo.png" alt="INFINITRIP Logo" onerror="this.style.display='none'; this.nextElementSibling.style.display='inline-flex';">
                    <span style="display: none;"><i class="fas fa-globe"></i> INFINITRIP</span>
                </div>
                <ul class="nav-menu">
                    <li><a href="index.html">Home</a></li>
                    <li><a href="destinations.html">Destinations</a></li>
                    <li><a href="tours.html">Tours</a></li>
                    <li><a href="booking.html">Book Now</a></li>
                    <li><a href="index.html#about">About</a></li>
                    <li><a href="index.html#contact">Contact</a></li>
                    <li><a href="signin.html">Sign In</a></li>
                    <li><a href="signup.html">Sign Up</a></li>
                </ul>
                <div class="hamburger">
                    <span></span>
                    <span></span>
                    <span></span>
                </div>
            </div>
        </div>
    </nav>

    <section class="otp-container">
        <div class="otp-card">
            <div class="otp-header">
                <h1 id="otpHeading">Verify OTP</h1>
                <p id="otpSubheading">Enter the OTP sent to you.</p>
            </div>

            <div id="otpError" class="message error"></div>
            <div id="otpSuccess" class="message success"></div>

            <div class="otp-meta" id="otpMeta">
                <div><strong>OTP For:</strong> <span id="otpContextTitle">—</span></div>
                <div style="margin-top: 6px;"><strong>Sent To:</strong> <span id="otpContextDetail">—</span></div>
                <div style="margin-top: 6px;"><strong>Reference:</strong> <span id="otpContextRef">—</span></div>
            </div>

            <form id="otpForm" class="otp-form">
                <input
                    type="text"
                    id="otpInput"
                    class="otp-input"
                    inputmode="numeric"
                    autocomplete="one-time-code"
                    maxlength="6"
                    placeholder="Enter 6-digit OTP"
                    pattern="^[0-9]{6}$"
                    required
                />
                <div class="otp-actions">
                    <button type="submit" id="verifyOtpBtn" class="btn-primary">
                        <i class="fas fa-check"></i> Verify OTP
                    </button>
                    <button type="button" id="resendOtpBtn" class="btn-secondary">
                        <i class="fas fa-rotate-right"></i> Resend OTP
                    </button>
                </div>
            </form>

            <div id="otpDemo" class="otp-demo">
                <strong>Demo OTP (local only):</strong> <span id="otpDemoCode">—</span>
            </div>

            <div class="back-link" id="otpBackLink">
                <a href="#" id="otpBackAnchor">Go back</a>
            </div>
        </div>
    </section>

    <script src="auth.js"></script>
    <script src="otp.js"></script>
</body>
</html>
